services:
  - type: web
    name: tickethub
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BETTER_AUTH_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
